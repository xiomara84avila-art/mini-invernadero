<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Control WiFi - ITLB</title>
<link rel="stylesheet" href="styles.css">
</head>
<body onload="protegerPagina()">

<header>
    <h1>INSTITUTO TÉCNICO LUIS BOGRÁN</h1>
    <nav>
        <button onclick="mostrarSeccion('inicio')">Inicio</button>
        <button onclick="mostrarSeccion('bomba')">Bomba</button>
        <button onclick="mostrarSeccion('foco')">Foco</button>
        <button onclick="mostrarSeccion('ventilador')">Ventilador</button>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </nav>
</header>

<main>

    <!-- INICIO -->
    <section id="inicio" class="seccion">
        <div class="card">
            <h2>Bienvenido</h2>
            <p>
                Sistema de automatización agrícola desarrollado con Arduino
                por el Instituto Técnico Luis Bográn.
            </p>

            <div class="grid">
                <div class="card-btn" onclick="mostrarSeccion('bomba')">🌱 Riego</div>
                <div class="card-btn" onclick="mostrarSeccion('foco')">🌡️ Temperatura</div>
                <div class="card-btn" onclick="mostrarSeccion('ventilador')">💧 Humedad</div>
            </div>
        </div>
    </section>

    <!-- BOMBA -->
    <section id="bomba" class="seccion oculto">
        <div class="card">
            <h2>Bomba de Riego</h2>
            <button class="on" onclick="enviarComando('BM_ON')">Encender</button>
            <button class="off" onclick="enviarComando('BM_OFF')">Apagar</button>
        </div>
    </section>

    <!-- FOCO -->
    <section id="foco" class="seccion oculto">
        <div class="card">
            <h2>Foco (Temperatura)</h2>
            <button class="on" onclick="enviarComando('FO_ON')">Encender</button>
            <button class="off" onclick="enviarComando('FO_OFF')">Apagar</button>
        </div>
    </section>

    <!-- VENTILADOR -->
    <section id="ventilador" class="seccion oculto">
        <div class="card">
            <h2>Ventilador (Humedad)</h2>
            <button class="on" onclick="enviarComando('VEN_ON')">Encender</button>
            <button class="off" onclick="enviarComando('VEN_OFF')">Apagar</button>
        </div>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
